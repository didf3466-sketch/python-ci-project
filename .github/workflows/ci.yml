name: Python CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install
      run: |
        pip install pytest flake8

    - name: Lint
      run: |
        flake8 .

    - name: Test
      run: |
        pytest
